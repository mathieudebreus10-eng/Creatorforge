<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorForge — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;
  --s1:#0d0d1a;
  --card:#16162a;
  --border:#232340;
  --p:#7c5cfc;
  --p2:#c084fc;
  --text:#f0f0fc;
  --muted:#7a7a9a;
  --green:#22c55e;
  --red:#f87171;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

.logo{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(90deg,var(--p),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px}
.tagline{color:var(--muted);font-size:14px;text-align:center;margin-bottom:32px}

.auth-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:380px}

.tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);transition:all 0.2s}
.tab.active{background:var(--p);color:#fff}

.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:block}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;padding:13px 16px;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--p)}
.form-input::placeholder{color:#444}

.btn{width:100%;background:linear-gradient(135deg,var(--p),#9b59fc);border:none;border-radius:12px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;padding:15px;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.msg{border-radius:10px;padding:12px 16px;font-size:13px;margin-top:12px;display:none;text-align:center}
.msg.error{background:#2a1020;border:1px solid #5a2040;color:var(--red)}
.msg.success{background:#0a2a1a;border:1px solid #1a5a2a;color:var(--green)}

.divider{text-align:center;color:var(--muted);font-size:12px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider::before{left:0}
.divider::after{right:0}

.google-btn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;font-weight:500;padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color 0.2s}
.google-btn:hover{border-color:var(--p)}

.footer-note{color:var(--muted);font-size:12px;text-align:center;margin-top:20px;line-height:1.6}
</style>
</head>
<body>

<div class="logo">CreatorForge ✦</div>
<p class="tagline">Your Personal YouTube AI Agent</p>

<div class="auth-card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn" onclick="handleLogin()" id="loginBtn">Sign In →</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input class="form-input" type="text" id="signupName" placeholder="Your name">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="signupEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="signupPassword" placeholder="Min 6 characters">
    </div>
    <button class="btn" onclick="handleSignup()" id="signupBtn">Create Free Account →</button>
    <div class="msg" id="signupMsg"></div>
  </div>

  <div class="divider">or</div>
  <button class="google-btn" onclick="handleGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
</div>

<p class="footer-note">By signing up, you agree to our Terms of Service.<br>No credit card required for free plan.</p>

<script>
// =============================================
// COLE SUAS CHAVES SUPABASE AQUI
// =============================================
const SUPABASE_URL = 'https://fvnjoaedwuwtuiulqhcw.supabase.co'
const SUPABASE_KEY = 'sb_publishable_-yEONjxLyxpHBM1QDRe4Zw_a3QTiH5b'
// =============================================

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

// Verificar se já está logado
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'app.html'
})

function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none'
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none'
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1))
  })
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPassword').value
  const btn = document.getElementById('loginBtn')
  const msg = document.getElementById('loginMsg')

  if (!email || !password) { showMsg('loginMsg', 'Please fill in all fields.', 'error'); return }

  btn.disabled = true
  btn.textContent = 'Signing in...'

  const { error } = await sb.auth.signInWithPassword({ email, password })

  if (error) {
    showMsg('loginMsg', error.message, 'error')
    btn.disabled = false
    btn.textContent = 'Sign In →'
  } else {
    showMsg('loginMsg', '✓ Success! Redirecting...', 'success')
    setTimeout(() => window.location.href = 'app.html', 1000)
  }
}

async function handleSignup() {
  const name = document.getElementById('signupName').value.trim()
  const email = document.getElementById('signupEmail').value.trim()
  const password = document.getElementById('signupPassword').value
  const btn = document.getElementById('signupBtn')

  if (!name || !email || !password) { showMsg('signupMsg', 'Please fill in all fields.', 'error'); return }
  if (password.length < 6) { showMsg('signupMsg', 'Password must be at least 6 characters.', 'error'); return }

  btn.disabled = true
  btn.textContent = 'Creating account...'

  const { error } = await sb.auth.signUp({
    email,
    password,
    options: { data: { full_name: name, plan: 'free', generations_used: 0 } }
  })

  if (error) {
    showMsg('signupMsg', error.message, 'error')
    btn.disabled = false
    btn.textContent = 'Create Free Account →'
  } else {
    showMsg('signupMsg', '✓ Account created! Check your email to confirm.', 'success')
    btn.textContent = 'Check your email ✓'
  }
}

async function handleGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app.html' }
  })
}

function showMsg(id, text, type) {
  const el = document.getElementById(id)
  el.textContent = text
  el.className = `msg ${type}`
  el.style.display = 'block'
}
</script>
</body>
</html>
