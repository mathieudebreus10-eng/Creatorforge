exports.handler = async function(event, context) {
  if (event.httpMethod !== 'POST') {
    return { statusCode: 405, body: 'Method Not Allowed' };
  }

  const { topic, niche, tone, language } = JSON.parse(event.body);
  const OPENAI_API_KEY = process.env.OPENAI_API_KEY;
  const lang = language || 'English';

  const prompt = `You are an expert YouTube content strategist. Generate a complete YouTube content package.

Video topic: "${topic}"
Niche: ${niche || 'General'}
Tone: ${tone || 'Inspirational'}
Language: ${lang}

CRITICAL: Respond with ONLY a JSON object. No markdown. No explanation. Just the raw JSON.

{"titles":["title1","title2","title3","title4","title5"],"hooks":["hook1","hook2","hook3"],"seo_description":"120-200 word SEO description in ${lang}","hashtags":["#hashtag1","#hashtag2","#hashtag3","#hashtag4","#hashtag5","#hashtag6","#hashtag7","#hashtag8","#hashtag9","#hashtag10"],"tags":["keyword 1","keyword 2","keyword 3","keyword 4","keyword 5","keyword 6","keyword 7","keyword 8","keyword 9","keyword 10","keyword 11","keyword 12","keyword 13","keyword 14","keyword 15"],"script":{"hook":"hook text","intro":"intro text","body":[{"section":"Point 1","content":"content"},{"section":"Point 2","content":"content"},{"section":"Point 3","content":"content"}],"outro":"outro text"},"thumbnail":{"background":"bg description","main_image":"image description","text_overlay":"3-4 WORDS","emotion":"target emotion"}}

Rules:
- Write all content in ${lang}
- hashtags: must start with #
- tags: 15 plain keywords WITHOUT # for YouTube's tag field
- All fields required`;

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 2500,
        temperature: 0.7,
        messages: [
          { role: 'system', content: `You are a YouTube content expert. You ONLY output raw JSON with no markdown, no backticks, no explanation. Every field is mandatory including the "tags" array with 15 keywords.` },
          { role: 'user', content: prompt }
        ]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.choices[0].message.content;
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    // Fallback robusto para tags
    if (!result.tags || !Array.isArray(result.tags) || result.tags.length === 0) {
      const fromHashtags = (result.hashtags || []).map(h => h.replace(/#/g, '').trim());
      const topicWords = topic.split(' ').filter(w => w.length > 2);
      const nicheTag = niche ? [niche] : [];
      result.tags = [...new Set([...fromHashtags, ...topicWords, ...nicheTag])].slice(0, 15);
    }

    // Remover # das tags caso a IA tenha colocado
    result.tags = result.tags.map(t => t.replace(/#/g, '').trim()).filter(t => t.length > 0);

    return {
      statusCode: 200,
      headers: { 'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*' },
      body: JSON.stringify(result)
    };
  } catch (err) {
    return {
      statusCode: 500,
      body: JSON.stringify({ error: err.message })
    };
  }
};
