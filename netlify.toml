exports.handler = async function(event, context) {
  if (event.httpMethod !== 'POST') {
    return { statusCode: 405, body: 'Method Not Allowed' };
  }

  const { topic, niche, tone, language } = JSON.parse(event.body);
  const OPENAI_API_KEY = process.env.OPENAI_API_KEY;
  const lang = language || 'English';

  const prompt = `You are an expert YouTube content strategist.

Video topic: "${topic}"
Niche: ${niche || 'General'}
Tone: ${tone || 'Inspirational'}
Output language: ${lang} — write ALL content in ${lang}.

Return ONLY valid JSON. No markdown. No extra text. Every field is REQUIRED — do not skip any field.

{
  "titles": ["title1","title2","title3","title4","title5"],
  "hooks": ["hook1","hook2","hook3"],
  "seo_description": "120-200 word SEO description",
  "hashtags": ["#tag1","#tag2","#tag3","#tag4","#tag5","#tag6","#tag7","#tag8","#tag9","#tag10"],
  "tags": ["keyword1","keyword2","keyword3","keyword4","keyword5","keyword6","keyword7","keyword8","keyword9","keyword10","keyword11","keyword12","keyword13","keyword14","keyword15"],
  "script": {
    "hook": "First 15 seconds script",
    "intro": "30-45 seconds intro",
    "body": [
      {"section":"Point 1","content":"Script content"},
      {"section":"Point 2","content":"Script content"},
      {"section":"Point 3","content":"Script content"}
    ],
    "outro": "Closing 30 seconds"
  },
  "thumbnail": {
    "background": "Background description",
    "main_image": "Main visual element",
    "text_overlay": "Bold 3-4 word text",
    "emotion": "Target emotion"
  }
}

IMPORTANT RULES:
- "hashtags" array: each item MUST start with # symbol
- "tags" array: 15 plain keyword phrases, NO # symbol, these are YouTube backend search tags
- ALL text must be written in ${lang}
- Do NOT skip the "tags" field — it is required`;

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 2500,
        temperature: 0.7,
        messages: [
          { role: 'system', content: 'You are an expert YouTube content strategist. Always respond with valid JSON only. Every field in the schema is required and must be included.' },
          { role: 'user', content: prompt }
        ]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.choices[0].message.content;
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    // Garantir que tags existe mesmo que a IA esqueça ou retorne vazio
    if (!result.tags || !Array.isArray(result.tags) || result.tags.length === 0) {
      // Gerar tags a partir do tópico e hashtags
      const topicWords = topic.split(' ').filter(w => w.length > 2);
      const fromHashtags = (result.hashtags || []).map(h => h.replace('#', ''));
      result.tags = [...new Set([...topicWords, ...fromHashtags])].slice(0, 15);
    }

    return {
      statusCode: 200,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(result)
    };
  } catch (err) {
    return {
      statusCode: 500,
      body: JSON.stringify({ error: err.message })
    };
  }
};
